# ─────────────────────────────────────────────
# Kitty Terminal Configuration
# ─────────────────────────────────────────────

# ── Clipboard ──
clipboard_control write-clipboard write-primary read-clipboard read-primary

# ── Font ──
font_family JetBrainsMono Nerd Font
font_size 16

# ── Visual / Aesthetics ──
background_opacity 0.85
window_padding_width 8
hide_window_decorations titlebar-only
sync_to_monitor yes

# ── Bell ──
enable_audio_bell no
visual_bell_duration 0.1

# ── Misc ──
confirm_os_window_close 0
shell_integration enabled
allow_remote_control yes
listen_on unix:/tmp/kitty

# ── Undercurl support (for nvim LSP diagnostics) ──
undercurl_style thin-sparse

# ── Scrollback ──
scrollback_lines 10000
map ctrl+shift+g launch --stdin-source=@screen_scrollback --type=overlay less +G -R
# Open scrollback in nvim (search, yank, navigate with full vim power)
scrollback_pager nvim -c "set nonumber norelativenumber signcolumn=no nolist showtabline=0 foldcolumn=0 laststatus=0" -c "autocmd TermOpen * normal G" -c "silent write! /tmp/kitty_scrollback_buffer | te cat /tmp/kitty_scrollback_buffer"
map ctrl+shift+s show_scrollback

# ── Layouts / Splits ──
enabled_layouts splits
# Startup session (3-pane layout: main + side + bottom)
startup_session ~/.config/kitty/startup.conf

# Vertical split
map ctrl+shift+v launch --location=vsplit
# Horizontal split
map ctrl+shift+h launch --location=hsplit

# Move between splits (ctrl+alt so it works even inside nvim)
map ctrl+alt+l neighboring_window right
map ctrl+alt+h neighboring_window left
map ctrl+alt+k neighboring_window up
map ctrl+alt+j neighboring_window down

# Resize splits
map ctrl+shift+r>l resize_window wider 4
map ctrl+shift+r>h resize_window narrower 4
map ctrl+shift+r>k resize_window taller 4
map ctrl+shift+r>j resize_window shorter 4

# ── Tab navigation ──
map ctrl+shift+t new_tab
map ctrl+shift+w close_tab
map ctrl+shift+. next_tab
map ctrl+shift+, previous_tab
map ctrl+shift+alt+. move_tab_forward
map ctrl+shift+alt+, move_tab_backward
map ctrl+shift+alt+t set_tab_title

# Jump to tab by number
map ctrl+alt+1 goto_tab 1
map ctrl+alt+2 goto_tab 2
map ctrl+alt+3 goto_tab 3
map ctrl+alt+4 goto_tab 4
map ctrl+alt+5 goto_tab 5

# ── Hints kitten ──
map ctrl+shift+e open_url_with_hints
map ctrl+shift+p>f kitten hints --type path --program -
map ctrl+shift+p>h kitten hints --type hash --program -

# ── Tab bar ──
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_min_tabs 1
active_tab_font_style bold
inactive_tab_font_style normal
active_tab_foreground   #1e2030
active_tab_background   #8aadf4
inactive_tab_foreground #cad3f5
inactive_tab_background #1e2030
tab_bar_background      #181926

# ── Markers (highlight & jump between patterns) ──
# Mark error/warning lines and jump between them
map ctrl+shift+m>e toggle_marker text 1 ERROR 2 WARNING
# Mark TODO/FIXME lines
map ctrl+shift+m>t toggle_marker text 1 TODO 2 FIXME
# Clear markers
map ctrl+shift+m>c remove_marker
# Jump to next/previous marker
map ctrl+shift+] scroll_to_mark next
map ctrl+shift+[ scroll_to_mark prev

# ── Broadcast input ──
# Toggle typing in all windows at once
map ctrl+shift+alt+b launch --allow-remote-control kitty +kitten broadcast

# ── Catppuccin Macchiato Color Scheme ──

# Default colors
foreground #cad3f5
background #24273a

# Selection
selection_foreground #24273a
selection_background #f4dbd6

# Cursor
cursor #f4dbd6
cursor_text_color #24273a

# Black
color0  #494d64
color8  #5b6078

# Red
color1  #ed8796
color9  #ed8796

# Green
color2  #a6da95
color10 #a6da95

# Yellow
color3  #eed49f
color11 #eed49f

# Blue
color4  #8aadf4
color12 #8aadf4

# Magenta
color5  #f5bde6
color13 #f5bde6

# Cyan
color6  #8bd5ca
color14 #8bd5ca

# White
